{% include "header.html" %}
{% include "navbar.html" %}

<div class="container rounded mt-5 mb-5">
    <div class="row">

        <div class="col-md-3 border-right">
            <div class="d-flex flex-column align-items-center text-center p-3 py-5">
                <img class="rounded-circle mt-5" width="150px"
                    src="https://st3.depositphotos.com/15648834/17930/v/600/depositphotos_179308454-stock-illustration-unknown-person-silhouette-glasses-profile.jpg">
                <span class="font-weight-bold">{{ current_user.name }}</span>
                <span>{{ current_user.email }}</span>
                <span> </span>
            </div>
        </div>

        <div class="col-md-9">
            <div class="p-3 py-5">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="text-right">Profile Settings</h4>
                </div>
                <form method="post">
                    <div class="row mt-2">
                        <div class="col-md-6">
                            <label class="labels">Name</label>
                            <input type="text" name="name" class="form-control" value="{{ current_user.name }}">
                        </div>
                        <div class="col-md-6">
                            <label class="labels">Surname</label>
                            <input type="text" name="surname" class="form-control" value="{{ current_user.surname }}">
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-12">
                            <label class="labels">Mobile Number</label>
                            <input type="number" name="phone" class="form-control" value="{{ current_user.phone }}">
                        </div>
                        <div class="col-md-12">
                            <label class="labels">City</label>
                            <input type="text" name="city" class="form-control" value="{{ current_user.city }}">
                        </div>
                        <div class="col-md-12">
                            <label class="labels">Country</label>
                            <input type="text" name="country" class="form-control" value="{{ current_user.country }}">
                        </div>
                        <div class="col-md-12">
                            <label class="labels">Date created</label>
                            <p>{{ current_user.date_created.strftime("%Y-%m-%d") }}</p>
                        </div>
                    </div>
                    <div class="d-flex justify-content-around align-items-center">
                        <div class="mt-5 text-center">
                            <button class="btn btn-primary profile-button" name="submit" value="save" type="submit">Save Profile</button>
                        </div>
                        <div class="mt-5 text-center">
                            <button class="btn btn-danger" onclick="return confirm('Are you sure you want to delete your entire profile?')" name="submit" value="delete" type="submit">Delete Profile</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
